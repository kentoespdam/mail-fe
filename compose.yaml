services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: mail-fe:local
    container_name: mail-fe
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000/login" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
